<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpeedX Pro</title>

<style>
  body {
    margin: 0;
    background: #050b1a;
    color: white;
    font-family: Arial;
    text-align: center;
  }

  h1 {
    margin-top: 30px;
  }

  .meter {
    width: 280px;
    height: 280px;
    border-radius: 50%;
    margin: 40px auto;
    border: 6px solid rgba(255,255,255,0.1);
    position: relative;
    box-shadow: 0 0 30px #00e5ff33;
  }

  .needle {
    width: 4px;
    height: 120px;
    background: #00e5ff;
    position: absolute;
    bottom: 50%;
    left: 50%;
    transform-origin: bottom;
    transform: rotate(-90deg);
    box-shadow: 0 0 10px #00e5ff;
  }

  .speed {
    font-size: 40px;
    margin-top: -20px;
    color: #00e5ff;
  }

  button {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    background: #22c55e;
    color: white;
  }
</style>
</head>

<body>

<h1>🚀 SpeedX Pro</h1>

<div class="meter">
  <div class="needle" id="needle"></div>
</div>

<div class="speed" id="speed">0 km/h</div>

<button onclick="startTracking()">Start</button>

<script>
function startTracking() {
  navigator.geolocation.watchPosition(function(pos) {
    let speed = pos.coords.speed;

    if (speed !== null) {
      let kmh = speed * 3.6;
      document.getElementById("speed").innerText = kmh.toFixed(1) + " km/h";

      let angle = Math.min(kmh * 2, 180) - 90;
      document.getElementById("needle").style.transform = "rotate(" + angle + "deg)";
    }
  });
}
</script>

</body>
</html>
